name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13', '3.14']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v7
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: uv run pytest

  opus-quality:
    name: Opus quality gate
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python 3.12
      uses: actions/setup-python@v7
      with:
        python-version: '3.12'

    - name: Install libopus
      run: sudo apt-get update && sudo apt-get install --yes libopus-dev

    - name: Install uv
      uses: astral-sh/setup-uv@v8.3.2
      with:
        enable-cache: true

    - name: Install dependencies with Opus support
      run: uv sync --extra opus

    - name: Run Opus quality tests
      run: uv run pytest tests/test_audio_encoder.py
